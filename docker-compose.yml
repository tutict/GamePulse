services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: gamepulse
      POSTGRES_USER: gamepulse
      POSTGRES_PASSWORD: gamepulse
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gamepulse -d gamepulse"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: .
    command: npm run start -w @gamepulse/api
    environment:
      PORT: 4317
      DATABASE_URL: postgres://gamepulse:gamepulse@postgres:5432/gamepulse
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://127.0.0.1:5173
      MODEL_PROVIDER: heuristic
    ports:
      - "4317:4317"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: npm run start:worker -w @gamepulse/api
    environment:
      DATABASE_URL: postgres://gamepulse:gamepulse@postgres:5432/gamepulse
      REDIS_URL: redis://redis:6379
      MODEL_PROVIDER: heuristic
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build: .
    command: npm run preview -w @gamepulse/web -- --host 0.0.0.0
    environment:
      VITE_API_BASE: http://127.0.0.1:4317
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres-data:
